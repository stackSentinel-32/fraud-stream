version: "3.8"

# ─────────────────────────────────────────────────────────────────
# fraud-stream · Full Stack
#
# Starts with: docker compose up --build
# Producer is intentionally excluded — run manually to demo live flow:
#   python producer/producer.py
#
# Network note: services talk to each other using Docker's internal
# DNS (service name as hostname). Host-accessible ports are separate.
#   kafka internal  → kafka:29092
#   kafka external  → localhost:9092
#   postgres        → postgres:5432 (internal), localhost:5432 (host)
# ─────────────────────────────────────────────────────────────────

services:

  # ── Infrastructure ─────────────────────────────────────────────

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: fraud_zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    healthcheck:
      test: [ "CMD", "bash", "-c", "echo srvr | nc -w 2 localhost 2181 | grep Zookeeper" ]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: fraud_kafka
    restart: unless-stopped
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,PLAINTEXT_INTERNAL://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT_INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG4J_ROOT_LOGLEVEL: WARN
    healthcheck:
      test: [ "CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list" ]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 30s

  postgres:
    image: postgres:16-alpine
    container_name: fraud_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Application services ────────────────────────────────────────

  api:
    build: .
    container_name: fraud_api
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file: .env
    # 4 workers saturates 4 CPU cores; each handles predict_proba independently
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000 --workers 4
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      # urllib is in stdlib — no curl/wget required in the slim image
      test: [ "CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  consumer:
    build: .
    container_name: fraud_consumer
    restart: unless-stopped
    env_file: .env
    environment:
      # Override localhost addresses with Docker-internal service names
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      POSTGRES_HOST: postgres
      API_BASE_URL: http://api:8000
    command: python consumer/consumer.py
    depends_on:
      api:
        condition: service_healthy
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy

  dashboard:
    build: .
    container_name: fraud_dashboard
    restart: unless-stopped
    ports:
      - "8501:8501"
    env_file: .env
    environment:
      POSTGRES_HOST: postgres
    command: >
      streamlit run dashboard/dashboard.py --server.port 8501 --server.address 0.0.0.0 --server.headless true
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
    driver: local
